<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fondo blanco -->
  <rect width="200" height="200" fill="#ffffff"/>
  
  <!-- Tallo principal -->
  <rect x="80" y="60" width="40" height="100" fill="#2D7C4C" rx="20"/>
  
  <!-- Brazo izquierdo -->
  <ellipse cx="50" cy="90" rx="25" ry="35" fill="#2D7C4C" transform="rotate(-30 50 90)"/>
  
  <!-- Brazo derecho -->
  <ellipse cx="150" cy="90" rx="25" ry="35" fill="#2D7C4C" transform="rotate(30 150 90)"/>
  
  <!-- Brazo inferior izquierdo -->
  <ellipse cx="60" cy="140" rx="20" ry="30" fill="#2D7C4C" transform="rotate(-40 60 140)"/>
  
  <!-- Brazo inferior derecho -->
  <ellipse cx="140" cy="140" rx="20" ry="30" fill="#2D7C4C" transform="rotate(40 140 140)"/>
  
  <!-- Espinas pequeñas del tallo principal -->
  <circle cx="75" cy="75" r="3" fill="#1a4d2e"/>
  <circle cx="125" cy="85" r="3" fill="#1a4d2e"/>
  <circle cx="70" cy="110" r="3" fill="#1a4d2e"/>
  <circle cx="130" cy="120" r="3" fill="#1a4d2e"/>
  <circle cx="75" cy="145" r="3" fill="#1a4d2e"/>
  <circle cx="125" cy="155" r="3" fill="#1a4d2e"/>
  
  <!-- Espinas de brazos -->
  <circle cx="30" cy="85" r="2" fill="#1a4d2e"/>
  <circle cx="170" cy="95" r="2" fill="#1a4d2e"/>
  <circle cx="45" cy="160" r="2" fill="#1a4d2e"/>
  <circle cx="155" cy="160" r="2" fill="#1a4d2e"/>
  
  <!-- Flores rosas en el tallo -->
  <circle cx="100" cy="70" r="6" fill="#FF69B4"/>
  <circle cx="100" cy="130" r="6" fill="#FF69B4"/>
</svg>
