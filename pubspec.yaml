name: captus_mobile
description: "Captus — Plataforma móvil de gestión académica inteligente con IA."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  sqflite: ^2.3.3
  path: ^1.9.0
  uuid: ^4.0.0

  # Navigation
  go_router: ^16.2.0

  # State management
  flutter_riverpod: ^3.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  flutter_slidable: ^4.0.3
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^0.69.0

  # Calendar
  table_calendar: ^3.1.2

  # Firebase
  firebase_core: ^4.8.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.2.1
  firebase_analytics: ^12.4.0

  # Auth & API
  supabase_flutter: ^2.8.4
  dio: ^5.9.2
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.2.1

  # Markdown rendering
  flutter_markdown: ^0.7.4

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2
  speech_to_text: ^7.3.0
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Testing dependencies
  mockito: ^5.4.4
  build_runner: ^2.4.9
  golden_toolkit: ^0.15.0
  network_image_mock: ^2.1.1

  integration_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/captus.jpeg

