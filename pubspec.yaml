name: captus_mobile
description: "Captus — Plataforma móvil de gestión académica inteligente con IA."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.2.2

  # State management
  flutter_riverpod: ^3.3.1

  # UI
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.3

  # Calendar
  table_calendar: ^3.1.2

  # Charts
  fl_chart: ^0.69.0

  # Local storage
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
