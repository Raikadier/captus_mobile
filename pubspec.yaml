name: captus_mobile
description: "Captus — Plataforma móvil de gestión académica inteligente con IA."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.7

  # State management
  flutter_riverpod: ^2.5.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  flutter_slidable: ^3.1.0

  # Calendar
  table_calendar: ^3.1.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  speech_to_text: ^6.6.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
