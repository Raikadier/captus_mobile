name: Mobile CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Create .env from secrets
        run: |
          cat <<EOF > .env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Dart analyze
        run: flutter analyze --fatal-infos

      - name: Run unit tests
        # Exclude test/integration/ — those tests require a full running backend
        # and Supabase instance (they are end-to-end, not unit tests).
        run: flutter test test/models test/providers test/widgets --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  build-apk:
    name: Build APK (smoke)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    # Only build on pushes to master, not on every PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create .env from secrets
        run: |
          cat <<EOF > .env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug — smoke test)
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: captus-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
